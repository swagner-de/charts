# This workflow builds and pushes an OCI Helm chart release for the chart changed in the commit.
# It tags the release with the chart version from Chart.yaml.

name: Helm Chart OCI Release

on:
  push:
    # paths:
    #   - 'charts/**'
    branches:
      - main

jobs:
  check-oci-release:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.charts.outputs.matrix }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.14.0
      - name: Find charts that need to be pushed (OCI version check)
        id: charts
        run: |
          CHART_DIRS=$(find charts/ -mindepth 1 -maxdepth 1 -type d)
          matrix_json="[]"
          for chart in $CHART_DIRS; do
            chart_name=$(basename "$chart")
            version=$(grep -E '^version: ' "$chart/Chart.yaml" | sed s/'version: '//)
            # Get all tags/versions from GitHub Container Registry API
            api_url="https://api.github.com/user/packages/container/${REPO_NAME}%2F${chart_name}/versions"
            response=$(curl -s -H "Accept: application/vnd.github+json" \
              -H "Authorization: Bearer $GITHUB_TOKEN" \
              "$api_url")
            if echo "$response" | jq -e 'type == "array" and length > 0' >/dev/null; then
              oci_versions=$(echo "$response" | jq -r '.[].metadata.container.tags[]?')
            else
              oci_versions=""
            fi
            if [ -z "$oci_versions" ]; then
              matrix_json=$(echo "$matrix_json" | jq ". += [{\"chart_path\": \"$chart\", \"chart_name\": \"$chart_name\", \"version\": \"$version\"}]")
            else
              if ! echo "$oci_versions" | grep -qx "$version"; then
                matrix_json=$(echo "$matrix_json" | jq ". += [{\"chart_path\": \"$chart\", \"chart_name\": \"$chart_name\", \"version\": \"$version\"}]")
              fi
            fi
          done
          echo "$matrix_json" | jq
          echo "matrix<<EOF" >> $GITHUB_OUTPUT
          echo "$matrix_json" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
    env:
      REPO_NAME: charts
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  release:
    needs: check-oci-release
    runs-on: ubuntu-latest
    if: ${{ needs.check-oci-release.outputs.matrix != '[]' }}
    strategy:
      matrix:
        charts: ${{ fromJson(needs.check-oci-release.outputs.matrix) }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.14.0

      - name: Build chart dependencies
        run: |
          helm dependency update
        working-directory: ${{ matrix.charts.chart_path }}

      - name: Release Helm chart to OCI
        uses: appany/helm-oci-chart-releaser@v0.5.0
        with:
          name: ${{ matrix.charts.chart_name }}
          repository: swagner-de/charts/
          registry: ghcr.io
          path: ${{ matrix.charts.chart_path }}
          registry_username: ${{ github.actor }}
          registry_password: ${{ secrets.GITHUB_TOKEN }}
          tag: ${{ matrix.charts.version }}
