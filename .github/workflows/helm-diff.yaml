name: Helm Diff on PR

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - 'charts/**'

permissions:
  contents: read
  pull-requests: write

jobs:
  helm-diff:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Checkout main branch to separate directory
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: ${{ github.event.pull_request.base.ref }}
          path: base-repo

      - name: Set up Helm
        uses: azure/setup-helm@v5
        with:
          version: v4.2.2

      - name: Set up chart-testing
        uses: helm/chart-testing-action@v2.8.0

      - name: Find changed charts
        id: list-changed
        run: |
          changed=$(ct list-changed --config .github/ct.yaml)
          echo "Changed charts:"
          echo "$changed"
          
          # Convert to JSON array for matrix
          if [[ -n "$changed" ]]; then
            charts_json=$(echo "$changed" | jq -R -s -c 'split("\n") | map(select(length > 0))')
            echo "charts=$charts_json" >> $GITHUB_OUTPUT
            echo "has_changes=true" >> $GITHUB_OUTPUT
          else
            echo "charts=[]" >> $GITHUB_OUTPUT
            echo "has_changes=false" >> $GITHUB_OUTPUT
          fi

      - name: Install yq
        if: steps.list-changed.outputs.has_changes == 'true'
        run: |
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      - name: Generate Helm diffs
        id: helm-diff
        if: steps.list-changed.outputs.has_changes == 'true'
        run: |
          echo "# Helm Diff Results" > diff_output.md
          echo "" >> diff_output.md

          sort_manifests() {
            local input_file="$1"
            local output_file="$2"
            yq eval 'del(.metadata.labels."helm.sh/chart")' "$input_file" | \
            yq eval-all '[.] | sort_by(.apiVersion + "/" + .kind + "/" + (.metadata.namespace // "default") + "/" + (.metadata.name // "unnamed")) | .[]' - \
              > "$output_file"
          }

          charts='${{ steps.list-changed.outputs.charts }}'
          for chart in $(echo "$charts" | jq -r '.[]'); do
            if [[ -z "$chart" ]]; then
              continue
            fi

            chart_name=$(basename "$chart")
            echo "Processing chart: $chart"

            echo "## Chart: $chart_name" >> diff_output.md
            echo "" >> diff_output.md

            echo "Preparing base version..."
            if [[ -f "base-repo/$chart/Chart.lock" ]]; then
              rm "base-repo/$chart/Chart.lock"
            fi
            (cd base-repo && helm dependency update "$chart") || echo "No dependencies to update for base version"

            echo "Preparing PR version..."
            if [[ -f "$chart/Chart.lock" ]]; then
              rm "$chart/Chart.lock"
            fi
            helm dependency update "$chart" || echo "No dependencies to update for PR version"

            namespace="helm-diff-${chart_name}"
            release_name="test-${chart_name}"

            echo "Running helm diff for $chart_name..."

            base_ok=true
            pr_ok=true
            helm template "$release_name" "base-repo/$chart" --namespace "$namespace" > base_templates_raw.yaml 2>/dev/null || base_ok=false
            helm template "$release_name" "$chart" --namespace "$namespace" > pr_templates_raw.yaml 2>/dev/null || pr_ok=false

            if [[ "$base_ok" == true && "$pr_ok" == true ]]; then
              sort_manifests base_templates_raw.yaml base_templates.yaml
              sort_manifests pr_templates_raw.yaml pr_templates.yaml

              diff_result=$(diff -u base_templates.yaml pr_templates.yaml) || true
              if [[ -n "$diff_result" ]]; then
                echo '```diff' >> diff_output.md
                echo "$diff_result" >> diff_output.md
                echo '```' >> diff_output.md
              else
                echo "No template changes." >> diff_output.md
              fi
            elif [[ "$base_ok" == false && "$pr_ok" == true ]]; then
              echo "<details>" >> diff_output.md
              echo "<summary>New chart — full rendered output</summary>" >> diff_output.md
              echo "" >> diff_output.md
              echo '```yaml' >> diff_output.md
              sort_manifests pr_templates_raw.yaml pr_templates.yaml
              cat pr_templates.yaml >> diff_output.md
              echo '```' >> diff_output.md
              echo "</details>" >> diff_output.md
            else
              echo '> **Warning:** template rendering failed' >> diff_output.md
              [[ "$base_ok" == false ]] && echo '> - Base version failed to render' >> diff_output.md
              [[ "$pr_ok" == false ]] && echo '> - PR version failed to render' >> diff_output.md
            fi

            echo "" >> diff_output.md
            rm -f base_templates_raw.yaml pr_templates_raw.yaml base_templates.yaml pr_templates.yaml
          done

          if [[ -f diff_output.md ]]; then
            echo "diff_content<<EOF" >> $GITHUB_OUTPUT
            cat diff_output.md >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          else
            echo "diff_content=No diff output generated" >> $GITHUB_OUTPUT
          fi

      - name: Comment PR with diff results
        if: steps.list-changed.outputs.has_changes == 'true'
        uses: actions/github-script@v9
        with:
          script: |
            const fs = require('fs');
            
            // Read the diff content from file to avoid template literal issues
            let diffContent = 'No diff content available';
            try {
              if (fs.existsSync('diff_output.md')) {
                diffContent = fs.readFileSync('diff_output.md', 'utf8');
              }
            } catch (error) {
              console.log('Error reading diff file:', error);
              diffContent = 'Error reading diff content';
            }
            
            // Find existing comment
            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            
            const botComment = comments.data.find(comment => 
              comment.user.type === 'Bot' && 
              comment.body.includes('# Helm Diff Results')
            );
            
            const commentBody = diffContent + '\n\n---\n*This comment was automatically generated by the Helm Diff workflow*';
            
            if (botComment) {
              // Update existing comment
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: commentBody
              });
            } else {
              // Create new comment
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: commentBody
              });
            }

      - name: No changes detected
        if: steps.list-changed.outputs.has_changes == 'false'
        run: |
          echo "No chart changes detected in this PR"
