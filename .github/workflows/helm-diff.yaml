name: Helm Diff on PR

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - 'charts/**'

permissions:
  contents: read
  pull-requests: write

jobs:
  helm-diff:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.17.2

      - name: Set up chart-testing
        uses: helm/chart-testing-action@v2.6.1

      - name: Find changed charts
        id: list-changed
        run: |
          git checkout ${{ github.event.pull_request.head.sha }}
          changed=$(ct list-changed --config .github/ct.yaml)
          echo "Changed charts:"
          echo "$changed"
          
          # Convert to JSON array for matrix
          if [[ -n "$changed" ]]; then
            charts_json=$(echo "$changed" | jq -R -s -c 'split("\n") | map(select(length > 0))')
            echo "charts=$charts_json" >> $GITHUB_OUTPUT
            echo "has_changes=true" >> $GITHUB_OUTPUT
          else
            echo "charts=[]" >> $GITHUB_OUTPUT
            echo "has_changes=false" >> $GITHUB_OUTPUT
          fi

      - name: Generate Helm diffs
        id: helm-diff
        if: steps.list-changed.outputs.has_changes == 'true'
        run: |
          echo "# Helm Diff Results" > diff_output.md
          echo "" >> diff_output.md
          
          charts='${{ steps.list-changed.outputs.charts }}'
          echo "$charts" | jq -r '.[]' | while read -r chart; do
            if [[ -z "$chart" ]]; then
              continue
            fi
            
            echo "Processing chart: $chart"
            chart_name=$(basename "$chart")
            
            echo "## Chart: $chart_name" >> diff_output.md
            echo "" >> diff_output.md
            
            # Create temporary directories to avoid Git conflicts
            mkdir -p /tmp/base-repo /tmp/pr-repo
            
            # Clone base version to separate directory
            echo "Cloning base version..."
            git clone . /tmp/base-repo
            cd /tmp/base-repo
            git fetch origin ${{ github.event.pull_request.base.ref }}
            git checkout ${{ github.event.pull_request.base.ref }}
            if [[ -f "$chart/Chart.lock" ]]; then
              rm "$chart/Chart.lock"
            fi
            helm dependency update "$chart" || echo "No dependencies to update for base version"
            
            # Clone PR version to separate directory  
            echo "Cloning PR version..."
            git clone . /tmp/pr-repo
            cd /tmp/pr-repo
            git checkout ${{ github.event.pull_request.head.sha }}
            if [[ -f "$chart/Chart.lock" ]]; then
              rm "$chart/Chart.lock"
            fi
            helm dependency update "$chart" || echo "No dependencies to update for PR version"
            
            # Go back to main directory
            cd $GITHUB_WORKSPACE
            
            # Create a temporary namespace for the diff
            namespace="helm-diff-${chart_name}"
            release_name="test-${chart_name}"
            
            # Run helm diff upgrade
            echo "Running helm diff for $chart_name..."
            echo '```diff' >> diff_output.md
            
            # Render base version templates (excluding helm labels)
            echo "# Base version (target branch: ${{ github.event.pull_request.base.ref }})" >> diff_output.md
            helm template "$release_name" "/tmp/base-repo/$chart" --namespace "$namespace" > base_templates_raw.yaml 2>/dev/null || {
              echo "Failed to render base templates for $chart_name" >> diff_output.md
            }
            
            # Render PR version templates (excluding helm labels)
            echo "# PR version (source branch: ${{ github.event.pull_request.head.ref }})" >> diff_output.md
            helm template "$release_name" "/tmp/pr-repo/$chart" --namespace "$namespace" > pr_templates_raw.yaml 2>/dev/null || {
              echo "Failed to render PR templates for $chart_name" >> diff_output.md
            }
            
            # Generate diff between the two versions
            if [[ -f base_templates_raw.yaml && -f pr_templates_raw.yaml ]]; then
              # Install yq for YAML processing
              sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
              sudo chmod +x /usr/local/bin/yq
              
              # Function to sort manifests by Group/Version/Kind and remove helm labels
              sort_manifests() {
                local input_file="$1"
                local output_file="$2"
                
                # First remove helm labels, then split into individual manifests and sort them
                yq eval 'del(.metadata.labels."helm.sh/chart")' "$input_file" | \
                yq eval-all '. as $item ireduce ({}; . *+ {($item | (.apiVersion // "v1") + "/" + (.kind // "Unknown") + "/" + (.metadata.namespace // "default") + "/" + (.metadata.name // "unnamed")): $item})' - | \
                yq eval 'to_entries | sort_by(.key) | map(.value) | .[]' - > "$output_file"
              }
              
              # Sort both manifest files
              sort_manifests base_templates_raw.yaml base_templates.yaml
              sort_manifests pr_templates_raw.yaml pr_templates.yaml
              
              # Generate diff
              diff -u base_templates.yaml pr_templates.yaml >> diff_output.md || true
              
              # Clean up temporary files
              rm -f base_templates_raw.yaml pr_templates_raw.yaml
            else
              echo "Could not generate diff for $chart_name - template rendering failed" >> diff_output.md
            fi
            
            echo '```' >> diff_output.md
            echo "" >> diff_output.md
            
            # Clean up temporary files and directories
            rm -f base_templates.yaml pr_templates.yaml
            rm -rf /tmp/base-repo /tmp/pr-repo
          done
          
          # Read the diff output and prepare it for GitHub comment
          if [[ -f diff_output.md ]]; then
            echo "diff_content<<EOF" >> $GITHUB_OUTPUT
            cat diff_output.md >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          else
            echo "diff_content=No diff output generated" >> $GITHUB_OUTPUT
          fi

      - name: Comment PR with diff results
        if: steps.list-changed.outputs.has_changes == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            
            // Read the diff content from file to avoid template literal issues
            let diffContent = 'No diff content available';
            try {
              if (fs.existsSync('diff_output.md')) {
                diffContent = fs.readFileSync('diff_output.md', 'utf8');
              }
            } catch (error) {
              console.log('Error reading diff file:', error);
              diffContent = 'Error reading diff content';
            }
            
            // Find existing comment
            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            
            const botComment = comments.data.find(comment => 
              comment.user.type === 'Bot' && 
              comment.body.includes('# Helm Diff Results')
            );
            
            const commentBody = diffContent + '\n\n---\n*This comment was automatically generated by the Helm Diff workflow*';
            
            if (botComment) {
              // Update existing comment
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: commentBody
              });
            } else {
              // Create new comment
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: commentBody
              });
            }

      - name: No changes detected
        if: steps.list-changed.outputs.has_changes == 'false'
        run: |
          echo "No chart changes detected in this PR"
