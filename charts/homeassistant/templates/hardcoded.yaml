{{- define "hardcoded" -}}
global:
  alwaysAppendIdentifierToResourceName: true
  createDefaultServiceAccount: false

defaultPodOptions:
  securityContext:
    runAsNonRoot: true
    runAsUser: 65534
    runAsGroup: 65534
    fsGroup: 65534
    fsGroupChangePolicy: OnRootMismatch

controllers:
  main:
    initContainers:
      init:
        enabled: {{ .Values.cnpg.enabled }}
        securityContext:
          readOnlyRootFilesystem: false
          allowPrivilegeEscalation: false
          seccompProfile:
            type: RuntimeDefault
          capabilities:
            drop:
            - ALL
        image:
          repository: alpine
          tag: 3.24.0
        command: ["sh"]
{{- $cnpgName := .Values.cnpg.clusterName }}
{{- if .Values.cnpg.prependReleaseName }}
{{- if contains .Chart.Name .Release.Name }}
{{- $cnpgName = printf "%s-%s" .Release.Name .Values.cnpg.clusterName }}
{{- else }}
{{- $cnpgName = printf "%s-%s-%s" .Release.Name .Chart.Name .Values.cnpg.clusterName }}
{{- end }}
{{- end }}
        envFrom:
          - secret: {{ $cnpgName }}-app
        args:
        - -c
        - |
            if [ -f /config/configuration.yaml ]; then
              sed -i "/db_url:/c\  db_url: postgresql://$username:$password@$host/$dbname?sslmode=verify-full&sslrootcert=/certs/ca.crt" /config/configuration.yaml
            fi
    containers:
      ldap:
        name: ldap
        image:
          repository: ghcr.io/swagner-de/home-assistant-ldap-helper
          tag: v1.0.1
        securityContext:
          readOnlyRootFilesystem: true
          allowPrivilegeEscalation: false
          seccompProfile:
            type: RuntimeDefault
          capabilities:
            drop:
            - ALL
        envFrom:
        - configMapRef:
            identifier: ldap
        - secretRef:
{{- if .Values.ldapSecret }}
            name: {{ .Values.ldapSecret }}
{{- else }}
            identifier: ldap
{{- end }}
        args:
        - run-server
      main:
        name: homeassistant
        image:
          repository: ghcr.io/home-operations/home-assistant
          tag: {{ .Chart.AppVersion | quote }}
        securityContext:
          readOnlyRootFilesystem: true
          allowPrivilegeEscalation: false
          seccompProfile:
            type: RuntimeDefault
          capabilities:
            drop:
            - ALL
        resources:
          requests:
            cpu: 500m
            memory: 400Mi
        probes:
          liveness: &probe
            enabled: true
            custom: true
            spec:
              httpGet:
                port: 8123
              initialDelaySeconds: 0
              periodSeconds: 10
              timeoutSeconds: 1
              failureThreshold: 3
          readiness: *probe
          startup: *probe
  ha-mcp:
    enabled: {{ .Values.hamcp.enabled | default false }}
    containers:
      main:
        name: ha-mcp
        image:
          repository: ghcr.io/homeassistant-ai/ha-mcp
          tag: latest
        command: ha-mcp-web
{{- if .Values.hamcp.secretName }}
        envFrom:
        - secretRef:
            name: {{ .Values.hamcp.secretName }}
{{- end }}
        env:
          - name: MCP_SECRET_PATH
            value: {{ .Values.hamcp.secretPath | default "/private" }}
{{- if .Values.hamcp.homeassistantUrl }}
          - name: HOMEASSISTANT_URL
            value: {{ .Values.hamcp.homeassistantUrl | quote }}
{{- end }}
{{- if .Values.hamcp.homeassistantToken }}
          - name: HOMEASSISTANT_TOKEN
            value: {{ .Values.hamcp.homeassistantToken | quote }}
{{- end }}
        securityContext:
          readOnlyRootFilesystem: true
          allowPrivilegeEscalation: false
          seccompProfile:
            type: RuntimeDefault
          capabilities:
            drop:
            - ALL
        resources:
          limits:
            memory: 256Mi
        probes:
          liveness: &hamcpprobe
            enabled: true
            custom: true
            spec:
              tcpSocket:
                port: 8086
              initialDelaySeconds: 0
              periodSeconds: 10
              timeoutSeconds: 1
              failureThreshold: 3
          readiness: *hamcpprobe
          startup: *hamcpprobe
  matterbridge:
    enabled: {{ .Values.matterbridge.enabled | default false }}
    containers:
      main:
        name: matterbridge
        image:
          repository: luligu/matterbridge
          tag: 3.9.0
        command: /matterbridge-init/matterbridge-init.sh
        env:
          - name: POD_IPS
            valueFrom:
              fieldRef:
                fieldPath: status.podIPs
          - name: MDNS_INTERFACE
            value: {{ .Values.matterbridge.mdns_interface }}
          - name: NPM_CONFIG_PREFIX
            value: /nonexistent/.npm-global
        securityContext:
          readOnlyRootFilesystem: false
          allowPrivilegeEscalation: false
          seccompProfile:
            type: RuntimeDefault
          capabilities:
            drop:
            - ALL
            add:
            - NET_RAW
persistence:
  config:
    type: persistentVolumeClaim
    advancedMounts:
      main:
        main:
          - path: /config
        init:
          - path: /config
  ha-mcp-tmp:
    enabled: {{ .Values.hamcp.enabled | default false }}
    type: emptyDir
    advancedMounts:
      ha-mcp:
        main:
        - path: /tmp

  matterbridge:
    enabled: {{ .Values.matterbridge.enabled | default false }}
    type: persistentVolumeClaim
    advancedMounts:
      matterbridge:
        main:
          - path: /nonexistent
  
  matterbridge-init:
    enabled: {{ .Values.matterbridge.enabled | default false }}
    type: configMap
    defaultMode: 0755
    identifier: matterbridge-init
    advancedMounts:
      matterbridge:
        main:
          - path: /matterbridge-init

  venv:
    type: emptyDir
    advancedMounts:
      main:
        main:
        - path: /config/.venv

  tmp:
    type: emptyDir
    advancedMounts:
      main:
        main:
        - path: /tmp
{{ if .Values.cnpg.enabled }}
{{- $cnpgName := .Values.cnpg.clusterName }}
{{- if .Values.cnpg.prependReleaseName }}
{{- if contains .Chart.Name .Release.Name }}
{{- $cnpgName = printf "%s-%s" .Release.Name .Values.cnpg.clusterName }}
{{- else }}
{{- $cnpgName = printf "%s-%s-%s" .Release.Name .Chart.Name .Values.cnpg.clusterName }}
{{- end }}
{{- end }}
  certs:
    type: secret
    name: {{ $cnpgName }}-ca
    advancedMounts:
      main:
        main:
        - path: /certs/ca.crt
          subPath: ca.crt
{{ end }}


configMaps:

  ldap:
    enabled: {{ .Values.controllers.main.containers.ldap.enabled }}
    data: {{ toYaml .Values.ldap  | nindent 6 }}

  matterbridge-init:
    enabled: {{ .Values.matterbridge.enabled | default false }}
    data:
      matterbridge-init.sh: |
        #!/bin/sh
        set -e

        IPV4=""
        IPV6=""

        # Split on commas
        IFS=',' read -r IP1 IP2 <<EOF
        $POD_IPS
        EOF

        for ip in "$IP1" "$IP2"; do
          case "$ip" in
            *:*) IPV6="$ip" ;;
            *.*) IPV4="$ip" ;;
          esac
        done

        ARGS="
        --logger debug
        --docker
        --mdnsinterface $MDNS_INTERFACE
        "

        #[ -n "$IPV4" ] && ARGS="$ARGS --ipv4address $IPV4"
        #[ -n "$IPV6" ] && ARGS="$ARGS --ipv6address $IPV6"

        mkdir -p "$NPM_CONFIG_PREFIX/lib/node_modules"
        rm -rf "$NPM_CONFIG_PREFIX/lib/node_modules/matterbridge"
        ln -sf /usr/local/lib/node_modules/matterbridge "$NPM_CONFIG_PREFIX/lib/node_modules/matterbridge"

        echo "Starting matterbridge with args:"
        echo "$ARGS"

        exec /usr/local/bin/matterbridge $ARGS

service:
  main:
    controller: main
    primary: true
    ports:
      http:
        port: 8123
        protocol: TCP
  ha-mcp:
    enabled: {{ .Values.hamcp.enabled | default false }}
    controller: ha-mcp
    ports:
      http:
        port: 8086
        protocol: TCP
  matterbridge:
    enabled: {{ .Values.matterbridge.enabled | default false }}
    controller: matterbridge
    ports:
      http:
        port: 8283
        protocol: TCP

rbac:
  roles: {}

{{ end }}

{{- $ctx := deepCopy . -}}
{{- $_ := include "hardcoded" . | fromYaml | mergeOverwrite $ctx.Values -}}

{{ include "bjw-s.common.loader.all" $ctx }}
