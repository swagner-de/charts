cnpgClusterName: db
rawResources:
  db:
    enabled: true
    apiVersion: postgresql.cnpg.io/v1
    kind: Cluster
    spec:
      spec:
        instances: 1
        imageName: ghcr.io/tensorchord/cloudnative-vectorchord:18-1.1.0
        postgresql:
          shared_preload_libraries:
            - "vchord.so"
        bootstrap:
          initdb:
            postInitSQL:
              - CREATE EXTENSION IF NOT EXISTS vchord CASCADE;
              - CREATE EXTENSION IF NOT EXISTS earthdistance CASCADE;
            postInitApplicationSQL:
              - CREATE EXTENSION IF NOT EXISTS vchord CASCADE;
              - CREATE EXTENSION IF NOT EXISTS earthdistance CASCADE;
        storage:
          size: 5Gi
          # storageClass: gp2
