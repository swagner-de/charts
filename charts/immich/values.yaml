    #           type: PathPrefix
    #           value: /
    #     backendRefs:
    #       - name: immich-server
    #         port: 2283

# -- Redis configuration (subchart)
redis:
  # -- Enable packaged Redis
  enabled: true
  # -- Redis architecture
  architecture: standalone
  # -- Redis authentication configuration
  auth:
    # -- Enable Redis authentication
    enabled: true
    # Let redis generate a random password or provide an existing secret with the password
    # existingSecret: immich-redis-user
    # existingSecretPasswordKey: password
  # -- Redis persistence configuration
  persistence:
    # -- Enable Redis persistence
    enabled: true
    # -- Redis volume size
    size: 1Gi

# -- Persistent storage configuration
persistence:
  # -- Photo library volume
  library:
    # storageClass: "gp2"
    # -- Photo library volume size
    size: 1Ti
    # -- Storage access mode
    accessMode: ReadWriteOnce
    # -- Volume type
    type: persistentVolumeClaim

  # -- Machine learning model cache volume
  ml-cache:
    # storageClass: "gp2"
    # -- ML cache volume size
    size: 10Gi
    # -- Storage access mode
    accessMode: ReadWriteOnce
    # -- Volume type
    type: persistentVolumeClaim


# You can provide additional configuration via config or configFromSecret.
# Both contents will be merged by an init container
