redis:
  enabled: true
  architecture: standalone
  auth:
    enabled: true
    # Let redis generate a random password or provide an existing secret with the password
    # existingSecret: immich-redis-user
    # existingSecretPasswordKey: password
  persistence:
    enabled: true
    size: 1Gi

persistence:
  library:
    # storageClass: "gp2"
    size: 1Ti
    accessMode: ReadWriteOnce
    type: persistentVolumeClaim

  ml-cache:
    # storageClass: "gp2"
    size: 10Gi
    accessMode: ReadWriteOnce
    type: persistentVolumeClaim


# You can provide additional configuration via config or configFromSecret.
# Both contents will be merged by an init container
