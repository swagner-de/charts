# -- Gateway API HTTPRoute configuration
route:
  main:
    # -- Enable Gateway API HTTPRoute
    enabled: false
    # annotations:
    # parentRefs:
    #   - namespace: envoy-gateway-system
    #     name: envoy-internal
    # hostnames:
    #   - immich.example.com
    # rules:
