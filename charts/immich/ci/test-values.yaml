serviceMonitor:
  main:
    enabled: true
    serviceName: test-immich-server
    endpoints:
      - port: metrics-api
        scheme: http
        path: /metrics
        interval: 1m
        scrapeTimeout: 10s
      - port: metrics-ms
        scheme: http
        path: /metrics
        interval: 1m
        scrapeTimeout: 10s
