# -- Persistent storage configuration
persistence:
  # -- ASN database volume
  data:
    # -- Enable persistent storage for ASN database
    enabled: true
    # storageClass: my-storage-class
    # -- Storage access mode
    accessMode: ReadWriteOnce
    # -- Volume size
    size: 1Gi

