{{- define "hardcoded" -}}
global:
  alwaysAppendIdentifierToResourceName: true

defaultPodOptions:
  securityContext:
    runAsNonRoot: true
    runAsUser: 1000
    runAsGroup: 1000
    fsGroup: 1000
    fsGroupChangePolicy: OnRootMismatch


controllers:
  main:
    initContainers:
      create-dirs:
        enabled: true
        env:
          PAPERLESS_DATA_DIR: /paperless/data
          PAPERLESS_TRASH_DIR: /paperless/trash
          PAPERLESS_MEDIA_ROOT: /paperless/media
          PAPERLESS_CONSUMPTION_DIR: /consumption/
        image:
          repository: alpine
          tag: 3.22.1
        command:
          - /bin/sh
        args:
          - -c
          - |
            for var in PAPERLESS_DATA_DIR PAPERLESS_TRASH_DIR PAPERLESS_MEDIA_ROOT; do
              dir=$(eval "echo \$$var")
              if [ -z "$dir" ]; then
                echo "Environment variable $var is not set, skipping."
                continue
              fi

              if [ ! -d "$dir" ]; then
                echo "Creating $dir"
                mkdir -p "$dir"
              fi
            done
    containers:
      main:
        enabled: true
        securityContext:
          # TODO replace with non-root image and run unprivileged
          runAsNonRoot: false
          readOnlyRootFilesystem: false
          privileged: true
          seccompProfile:
            type: RuntimeDefault
          capabilities:
            drop:
            - ALL
        env:
          PAPERLESS_DATA_DIR: /paperless/data
          PAPERLESS_TRASH_DIR: /paperless/trash
          PAPERLESS_MEDIA_ROOT: /paperless/media
          PAPERLESS_CONSUMPTION_DIR: /consumption/
{{- if .Values.paperless.admin.existingSecret }}
          PAPERLESS_ADMIN_USER:
            valueFrom:
              secretKeyRef:
                name: {{ .Values.paperless.admin.existingSecret | quote }}
                key: username
          PAPERLESS_ADMIN_PASSWORD:
            valueFrom:
              secretKeyRef:
                name: {{ .Values.paperless.admin.existingSecret | quote }}
                key: password
          PAPERLESS_ADMIN_MAIL:
            valueFrom:
              secretKeyRef:
                name: {{ .Values.paperless.admin.existingSecret | quote }}
                key: email
{{- end }}
{{- if .Values.paperless.oidcSecret }}
          PAPERLESS_SOCIALACCOUNT_PROVIDERS:
            valueFrom:
              secretKeyRef:
                name: {{ .Values.paperless.oidcSecret | quote }}
                key: PAPERLESS_SOCIAL_ACCOUNT_PROVIDERS
{{- end }}
          PAPERLESS_REDIS:
            dependsOn:
              - REDIS_HOST
              - REDIS_PASSWORD
            value: "redis://:$(REDIS_PASSWORD)@$(REDIS_HOST)"
{{- if .Values.redis.enabled }}
          REDIS_HOST: {{ printf "%s-redis" .Release.Name | quote }}
          REDIS_PASSWORD:
            valueFrom:
              secretKeyRef:
{{-   if and .Values.redis.auth.existingSecret .Values.redis.auth.existingSecretPasswordKey }}
                # internal redis, key from existing Secret
                name: {{ .Values.redis.auth.existingSecret }}
                key: {{ .Values.redis.auth.existingSecretPasswordKey }}
{{-   else }}
                # internal redis, key straight from .Values
                name: {{ printf "%s-redis" .Release.Name | quote }}
                key: redis-password
{{-   end }}
{{- else }}
{{-   if not (and .Values.redis.external.host .Values.redis.external.secretKeyRef) }}
{{-     fail ".Values.redis.external.host and .Values.redis.external.secretKeyRef must be set if packaged redis is not enabled"}}
{{-   end }}
          # external redis
          REDIS_HOST: "{{ .Values.redis.external.host }}"
          REDIS_PASSWORD:
            valueFrom:
              secretKeyRef:
                name: "{{ .Values.redis.external.secretKeyRef.name }}"
                key: "{{ .Values.redis.external.secretKeyRef.key }}"
{{- end }}
{{- if .Values.postgres.enabled }}
          PAPERLESS_DBHOST: {{ .Release.Name }}-postgres
          PAPERLESS_DBUSER: paperless
          PAPERLESS_DBPASS:
            valueFrom:
              secretKeyRef:
                # internal postgres, key straight from .Values
                name: {{ printf "%s-postgres" .Release.Name | quote }}
                key: postgres-password
{{- end }}
{{- if .Values.cnpg.enabled }}
          PAPERLESS_DBENGINE: postgres
          PAPERLESS_DBSSLMODE: verify-full
          PAPERLESS_DBSSLROOTCERT: "/dbcerts/ca.crt"
          PAPERLESS_DBHOST:
            valueFrom:
              secretKeyRef:
                name: {{ printf "%s-app" .Values.cnpg.clusterName }}
                key: host
          PAPERLESS_DBNAME:
            valueFrom:
              secretKeyRef:
                name: {{ printf "%s-app" .Values.cnpg.clusterName }}
                key: dbname
          PAPERLESS_DBUSER:
            valueFrom:
              secretKeyRef:
                name: {{ printf "%s-app" .Values.cnpg.clusterName }}
                key: user
          PAPERLESS_DBPASS:
            valueFrom:
              secretKeyRef:
                name: {{ printf "%s-app" .Values.cnpg.clusterName }}
                key: password
{{- end }}
{{- range $k, $v := .Values.paperless.config }}
          {{ printf "PAPERLESS_%s" (upper $k) }}: {{ $v | quote }}
{{- end }}
        image:
          repository: ghcr.io/paperless-ngx/paperless-ngx
          tag: {{ .Chart.AppVersion | quote }}
        probes:
          liveness: &probe
            custom: true
            enabled: true
            spec: &probeSpec
              httpGet:
                path: /
                port: 8000
              initialDelaySeconds: 20
              failureThreshold: 5
              periodSeconds: 0
              timeoutSeconds: 5
          readiness: *probe
          startup: *probe
  gotenberg:
    containers:
      main:
        enabled: true
        securityContext:
          readOnlyRootFilesystem: true
          allowPrivilegeEscalation: false
          seccompProfile:
            type: RuntimeDefault
          capabilities:
            drop:
            - ALL
        image:
          repository: docker.io/gotenberg/gotenberg
          tag: 8.28
        command:
          - gotenberg
        args:
          - "--chromium-disable-javascript=true"
          - "--chromium-allow-list=file:///tmp/.*"
        probes:
          liveness: &probe
            custom: true
            enabled: true
            spec: &probeSpec
              httpGet:
                path: /health
                port: 3000
              initialDelaySeconds: 10
              failureThreshold: 10
              periodSeconds: 10
              timeoutSeconds: 5
          readiness: *probe
          startup: *probe
  tika:
    containers:
      main:
        enabled: true
        securityContext:
          readOnlyRootFilesystem: true
          allowPrivilegeEscalation: false
          seccompProfile:
            type: RuntimeDefault
          capabilities:
            drop:
            - ALL
        image:
          repository: docker.io/apache/tika
          tag: 3.3.0.0
        probes:
          liveness: &probe
            custom: true  
            enabled: true
            spec: &probeSpec
              httpGet:
                path: /
                port: 9998
              initialDelaySeconds: 10
              failureThreshold: 10
              periodSeconds: 10
              timeoutSeconds: 5
          readiness: *probe
          startup: *probe

service:
  main:
    controller: main
    primary: true
    ports:
      http:
        port: 8000
        protocol: HTTP
  gotenberg:
    controller: gotenberg
    ports:
      http:
        port: 3000
        protocol: HTTP
  tika:
    controller: tika
    ports:
      http:
        port: 9998
        protocol: HTTP

secrets:
  admin:
    enabled: {{ not (hasKey .Values.paperless.admin "existingSecret") }}
    stringData: {{ .Values.paperless.admin | toYaml | nindent 6}}

persistence:
  data:
    enabled: true
    advancedMounts:
      main:
        main:
        - path: /paperless
        create-dirs:
        - path: /paperless

  consumption:
    enabled: true
    advancedMounts:
      main:
        main:
        - path: /consumption
          subPath: consumption/paperless/consumption

  tika-tmp:
    type: emptyDir
    advancedMounts:
      tika:
        main:
        - path: /tmp

{{- if .Values.cnpg.enabled }}
  dbcerts:
    enabled: true
    type: secret
    name: {{ printf "%s-ca" .Values.cnpg.clusterName }}
    advancedMounts:
      main:
        main:
          - path: /dbcerts/ca.crt
            subPath: ca.crt
{{- end }}

{{- end }}
{{- $ctx := deepCopy . -}}
{{- $_ := include "hardcoded" . | fromYaml | mergeOverwrite $ctx.Values -}}

{{ include "bjw-s.common.loader.all" $ctx }}
