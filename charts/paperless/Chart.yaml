apiVersion: v2
name: paperless
description: Document management system with OCR and full-text search
type: application
version: 0.40.0
home: https://docs.paperless-ngx.com/
sources:
  - https://github.com/swagner-de/charts
# renovate: image=ghcr.io/paperless-ngx/paperless-ngx
appVersion: '2.20.13'
dependencies:
  - name: common
    version: 4.6.2
    repository: https://bjw-s-labs.github.io/helm-charts/
  - name: postgres
    repository: oci://registry-1.docker.io/cloudpirates
    version: 0.18.3
    condition: postgres.enabled
  - name: redis
    version: 0.26.8
    repository: oci://registry-1.docker.io/cloudpirates
    condition: redis.enabled
maintainers:
  - name: swagner-de
    email: swagner-de@users.noreply.github.com
