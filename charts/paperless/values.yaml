# -- Paperless-ngx application configuration
paperless:
  # -- Admin credentials
  admin:
    # -- Existing secret with admin credentials
    existingSecret: ""
  # oidc secret will populate PAPERLESS_SOCIALACCOUNT_PROVIDERS with a json string contained in secret.PAPERLESS_SOCIAL_ACCOUNT_PROVIDERS
  # oidcSecret: paperless-oidc
  # -- Paperless config (keys converted to PAPERLESS_* env vars)
  config:
    # All of these options will be converted to environment variables prefixed with PAPERLESS and uppercased
    # use_x_forward_host: "1"
    # tika_enabled: "true"
    # tika_gotenberg_endpoint: gotenberg:3000
    # tika_endpoint: tika:9998
    # ocr_languages: "deu eng"
    # ocr_language: "deu"
    # time_zone: "Europe/Berlin"
    # apps: "allauth.socialaccount.providers.openid_connect"
    # url: "https://mydomain.de"
    # consumer_polling: "60"
    # consumer_recursive: "true"
    # ocr_rotate_pages: "false"
    # task_workers: "3"
    # threads_per_worker: "2"
    # consumer_enable_barcodes: "true"
    # consumer_barcode_scanner: "ZXING"


# -- Redis configuration (subchart)
redis:
  # enables the packaged redis chart
  # -- Enable packaged Redis
  enabled: true
  # set enabled=false and fill out the values for redis host secret
  # -- Redis architecture
  architecture: standalone
  # -- Redis authentication
  auth:
    # -- Enable Redis authentication
    enabled: true
    # -- Redis password
    password: "CHANGEME"  # REQUIRED: set your Redis password
  # -- Redis persistence
  persistence:
    # -- Enable Redis persistence
    enabled: true
    # -- Redis volume size
    size: 1Gi


# -- PostgreSQL database configuration (subchart)
postgres:
  # -- Enable packaged PostgreSQL
  enabled: true
  # -- PostgreSQL authentication
  auth:
    # -- Database username
    username: "paperless"
    # -- Database name
    database: "paperless"
    # -- Database password
    password: "CHANGEME"  # REQUIRED: set your database password

  # -- PostgreSQL persistence
  persistence:
    # -- Enable PostgreSQL persistence
    enabled: true
    # -- PostgreSQL volume size
    size: 10Gi


# -- CloudNativePG database configuration
cnpg:
  # In case CNPG operator is used, provide the cluster definition via additionalObjects
  # and set the postgresql.enabled to false
  # The cluster name must be provided for the database to be auto-configured
  # -- Enable CNPG operator
  enabled: false
  # -- CNPG cluster name
  clusterName: paperless-db


