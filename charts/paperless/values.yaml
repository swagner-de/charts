# -- Persistent storage configuration
persistence:
  # -- Document storage volume
  data:
    # -- Document storage volume size
    size: 100Gi
    # storageClass: "gp2"
    # -- Storage access mode
    accessMode: ReadWriteOnce
  # -- Consumption directory volume
  consumption:
    # -- Consumption directory volume size
    size: 1Gi
    # storageClass: "gp2"
    # -- Storage access mode
    accessMode: ReadWriteOnce


# -- Ingress configuration
ingress:
  main:
    # -- Enable ingress
    enabled: false

