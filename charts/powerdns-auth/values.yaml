# -- Persistent storage configuration
persistence:
  # -- Data volume for LMDB
  data:
    # -- Volume type
    type: persistentVolumeClaim
    # storageClass: my-class
    # -- Data volume size
    size: 2Gi

# -- External-DNS sidecar configuration
externalDNS:
  # -- Enable external-dns sidecar
  enabled: false
  # -- API key for external-dns
  apiKey:
    # -- API key value
    data: change-me
    # existingSecret:
    #   name: pdns-api
    #   key: API_KEY
  # -- External-DNS configuration
  config:
    # -- DNS record sources
    sources: []
    # -- DNS provider
    provider: pdns
    # -- PowerDNS server URL
    pdns-server: http://powerdns-auth:8081
    # txt-owner-id:
    # domain-filter:
    # log-level: info
    # interval: 30s


# -- PowerDNS configuration (pdns.conf format)
config: |
  launch=lmdb
  lmdb-filename=/data/pdns.lmdb

  # Logging
  log-dns-queries=yes
  loglevel=4

  webserver=yes
  webserver-address=0.0.0.0
  webserver-allow-from=10.0.0.0/8

# -- Sensitive PowerDNS configuration (api-key, etc.)
secretConfig:
  # -- Secret config data
  data: |
    api=yes
    api-key=CHANGEME
  # or
  # existingSecret:
  #   name: powerdns-auth

# -- DNS zone configuration
zone:
  # -- Zone name
  name: my-zone
  # -- Zone file content
  zonefile: |
    $TTL 2d    ; default TTL for zone
    $ORIGIN myzone.com. ; base domain-name
    ; Start of Authority RR defining the key characteristics of the zone (domain)
    @         IN      SOA   ns1.myzone.com. hostmaster.myzone.com. (
                                    2003080800 ; serial number
                                    12h        ; refresh
                                    15m        ; update retry
                                    3w         ; expiry
                                    2h         ; minimum
                                    )
    ; name server RR for the domain
              IN      NS      ns1.myzone.com.
    ns1        IN      A      10.0.0.1
    ns1        IN      AAAA   fdfd::
