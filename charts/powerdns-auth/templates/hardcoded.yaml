{{- define "hardcoded" -}}

defaultPodOptions:
  securityContext:
    runAsNonRoot: true
    runAsUser: 1883
    fsGroupChangePolicy: OnRootMismatch
    fsGroup: 1883


# Configure options applied to all pods
controllers:
  main:
    initContainers:
      create-zones:
        enabled: true
        image:
          repository: {{ printf "powerdns/pdns-auth-%s" (.Chart.AppVersion | replace "." "" | substr 0 2) | quote }}
          tag: {{ .Chart.AppVersion | quote }}
        command: ['/bin/sh', '-c']
        args:
        - |
          if pdnsutil list-zone {{ .Values.zone.name }} > /dev/null 2>&1; then
            echo "Zone {{ .Values.zone.name }} already exists, skipping load."
          else
            pdnsutil load-zone {{ .Values.zone.name }} /zones/{{ .Values.zone.name }}.zone
          fi
        securityContext:
          readOnlyRootFilesystem: true
          allowPrivilegeEscalation: false
          privileged: false
          seccompProfile:
            type: RuntimeDefault
          capabilities:
            drop:
            - ALL
    containers:
      main:
        enabled: true
        securityContext:
          readOnlyRootFilesystem: true
          allowPrivilegeEscalation: false
          seccompProfile:
            type: RuntimeDefault
          capabilities:
            drop:
            - ALL
        image:
          repository: {{ printf "powerdns/pdns-auth-%s" (.Chart.AppVersion | replace "." "" | substr 0 2) | quote }}
          tag: {{ .Chart.AppVersion | quote }}
        args:
          - --include-dir=/etc/powerdns/secret
          - --local-port=5353
        probes:
          liveness: &probe
            enabled: true
            custom: true
            spec:
              tcpSocket:
                port: 5353
              initialDelaySeconds: 5
              periodSeconds: 10
          readiness: *probe
          startup: *probe
        resources:
          requests:
            cpu: 100m
            memory: 100Mi
  external-dns:
    enabled: {{ .Values.externalDNS.enabled }}
    serviceAccount:
      identifier: powerdns-auth
    automountServiceAccountToken: true
    containers:
      main:
        securityContext:
          readOnlyRootFilesystem: true
          allowPrivilegeEscalation: false
          privileged: false
          seccompProfile:
            type: RuntimeDefault
          capabilities:
            drop:
            - ALL
{{- if not (hasKey .Values.secretConfig "existingSecret") }}
        envFrom:
        - secret: external-dns
{{- else }}
        env:
          API_KEY:
            valueFrom:
              secretKeyRef: {{ .Values.externalDNS.apiKey.existingSecret | toYaml | nindent 16 }}
{{- end }}
        image:
          repository: registry.k8s.io/external-dns/external-dns
          tag: v0.19.0
        args:
        - --pdns-api-key=$(API_KEY)
{{- range $key, $value := .Values.externalDNS.config }}
{{-   if and (hasSuffix "s" $key) (kindIs "slice" $value) }}
{{-     range $item := $value }}
        - --{{ $key | trimSuffix "s" }}={{ $item }}
{{-     end }}
{{-   else }}
        - --{{ $key }}={{ $value }}
{{-   end }}
{{- end }}
        probes:
          liveness: &probe
            enabled: false
          readiness: *probe
          startup: *probe
service:
  main:
    controller: main
    primary: true
    ports:
      dns-tcp:
        port: 53
        protocol: TCP 
        targetPort: 5353
      dns-udp:
        port: 53
        protocol: UDP
        targetPort: 5353
      http:
        port: 8081
        protocol: HTTP

ingress:
  main:
    enabled: false

configMaps:
  config:
    enabled: true
    data:
      pdns.conf: |
{{ .Values.config | indent 8 }}
  zones:
    enabled: true
    data:
      {{ .Values.zone.name }}.zone: |
{{ .Values.zone.zonefile | indent 8 }}

secrets:
  config:
    enabled: {{ not (hasKey .Values.secretConfig "existingSecret") }}
    stringData: 
      secret.conf: |
{{ .Values.secretConfig.data | indent 10 }}
  external-dns:
    enabled: {{ not (hasKey .Values.externalDNS.apiKey "existingSecret") }}
    stringData:
      API_KEY: {{ .Values.externalDNS.apiKey.data }}


persistence:
  config:
    type: configMap
    identifier: config
    advancedMounts:
      main:
        main:
        - path: /etc/powerdns/
        create-zones:
        - path: /etc/powerdns/
  control:
    type: emptyDir
    advancedMounts:
      main:
        main:
        - path: /var/run/pdns
        create-zones:
        - path: /var/run/pdns
  zones:
    type: configMap
    identifier: zones
    advancedMounts:
      main:
        create-zones:
        - path: /zones
  secret:
    type: secret
{{- if not (hasKey .Values.secretConfig "existingSecret") }}
    identifier: config
{{- else }}
    name: {{ .Values.secretConfig.existingSecret.name }}
{{- end }}
    advancedMounts:
      main:
        main:
        - path: /etc/powerdns/secret
  data:
    accessMode: ReadWriteOnce
    advancedMounts:
      main:
        create-zones:
        - path: /data
        main:
        - path: /data

{{- if .Values.externalDNS.enabled }}
serviceAccount:
  default:
    enabled: false
  powerdns-auth:
    enabled: true

rbac:
  roles:
    external-dns:
      type: ClusterRole
      rules:
      - apiGroups: [""]
        resources: ["services","endpoints","pods"]
        verbs: ["get","watch","list"]
      - apiGroups: ["extensions","networking.k8s.io"]
        resources: ["ingresses"]
        verbs: ["get","watch","list"]
      - apiGroups: [""]
        resources: ["pods"]
        verbs: ["get","watch","list"]
      - apiGroups: [""]
        resources: ["nodes"]
        verbs: ["list", "watch"]
      - apiGroups: ["discovery.k8s.io"]
        resources: ["endpointslices"]
        verbs: ["get","watch","list"]
  bindings:
    external-dns:
      type: ClusterRoleBinding
      roleRef:
        identifier: external-dns
      subjects:
        - identifier: powerdns-auth
{{- end }}

{{ end }}

{{- $ctx := deepCopy . -}}
{{- $_ := include "hardcoded" . | fromYaml | mergeOverwrite $ctx.Values -}}

{{ include "bjw-s.common.loader.all" $ctx }}
