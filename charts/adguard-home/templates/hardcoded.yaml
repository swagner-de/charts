{{- define "hardcoded" -}}

defaultPodOptions:
  securityContext:
    runAsNonRoot: true
    runAsUser: 1000
    runAsGroup: 1000
    fsGroup: 1000
    fsGroupChangePolicy: OnRootMismatch

# Configure options applied to all pods
controllers:
  main:
    initContainers:
      change-dns-port:
        enabled: true
        securityContext:
          readOnlyRootFilesystem: true
          allowPrivilegeEscalation: false
          privileged: false
          seccompProfile:
            type: RuntimeDefault
          capabilities:
            drop:
            - ALL
        env:
          CONFIG: "/adguard/etc/config.yaml"
        image:
          repository: mikefarah/yq
          tag: 4.52.2
        command: /bin/sh
        args:
        - -c
        - |
          if [ ! -f "$CONFIG" ]; then
              echo "Config file not found, creating $CONFIG with dns.port = 5353"
              yq -n '.dns.port = 5353' > "$CONFIG"
              exit 0
          fi
          echo "Making sure adguard runs DNS on port 5353 so NET_CAP_BIND_PORT is not needed"
          PORT=$(yq '.dns.port' "$CONFIG")
          if [ "$PORT" = "null" ]; then
              echo "Port is null, setting to 5353..."
              yq -i '.dns.port = 5353' "$CONFIG"
          elif [ "$PORT" != "5353" ]; then
              echo "Port is $PORT, changing to 5353..."
              yq -i '.dns.port = 5353' "$CONFIG"
          else
              echo "Port is already 5353, nothing to do."
          fi
    containers:
      main:
        enabled: true
        securityContext:
          readOnlyRootFilesystem: true
          allowPrivilegeEscalation: false
          privileged: false
          seccompProfile:
            type: RuntimeDefault
          capabilities:
            drop:
            - ALL
        image:
          repository: 11notes/adguard
          tag: {{ .Chart.AppVersion | quote }}
        probes:
          liveness: &probe
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /
                port: 3000
              initialDelaySeconds: 5
              periodSeconds: 10
              timeoutSeconds: 5
              successThreshold: 1
              failureThreshold: 3
          readiness: *probe
          startup: *probe
      exporter:
        enabled: true
        image:
          repository: ghcr.io/henrywhitaker3/adguard-exporter
          tag: v1.2.1
        env:
          ADGUARD_SERVERS: http://127.0.0.1:3000
          ADGUARD_USERNAMES: dummy
          ADGUARD_PASSWORDS: dummy

service:
  main:
    controller: main
    primary: true
    ports:
      http:
        port: 3000
        protocol: TCP
      dns-tcp:
        port: 53
        protocol: TCP
        targetPort: 5353
      dns-udp:
        port: 53
        protocol: UDP
        targetPort: 5353
      dns-over-tls:
        enabled: true
        protocol: TCP
        port: 853
      dns-over-quic:
        enabled: true
        protocol: UDP
        port: 853
  exporter:
    enabled: true
    controller: main
    ports:
      http:
        enabled: true
        port: 9618
        protocol: TCP


serviceMonitor:
  main:
    serviceName: {{printf "%s-exporter" .Release.Name | quote}}
    endpoints:
      - port: http
        scheme: http
        path: /metrics
        interval: 30s
        scrapeTimeout: 10s


persistence:
  config:
    advancedMounts:
      main:
        main:
        - path: /adguard/etc
        change-dns-port:
        - path: /adguard/etc

  data:
    advancedMounts:
      main:
        main:
        - path: /adguard/var
{{ end }}

{{- $ctx := deepCopy . -}}
{{- $_ := include "hardcoded" . | fromYaml | mergeOverwrite $ctx.Values -}}

{{ include "bjw-s.common.loader.all" $ctx }}
