controllers:
  main:
    containers:
      main:
        env:
          HOMEPAGE_ALLOWED_HOSTS: mydomain.com
        resources:
          requests:
            cpu: 100m
            memory: 100Mi
          limits:
            cpu: 500m
            memory: 500Mi

# route:
#   main:
#     enabled: true
#     hostnames:
#       - homepage.mydomain.com
#     parentRefs:
