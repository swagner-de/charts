#         name: gw
#     rules:
#       - matches:
#           - path:
#               type: PathPrefix
#               value: /
#         backendRefs:
#           - name: homepage
#             port: 3000


# These will be passed as environment variables to the container.
# Environment variables must start with HOMEPAGE_VAR_ or HOMEPAGE_FILE_
# The value of env var HOMEPAGE_VAR_XXX will replace {{HOMEPAGE_VAR_XXX}} in any config
# The value of env var HOMEPAGE_FILE_XXX must be a file path, the contents of which will be used to replace {{HOMEPAGE_FILE_XXX}} in any config
secretReplacements: {}
  # HOMEPAGE_VAR_API_KEY: "mysecretapikey"

# A list of external secrets to be passed as environment variables to the container.
additionalSecrets: []
  # - name: mysecret

config:
  kubernetes:
    mode: cluster
    gateway: true
  settings:
    language: de
    title: Home Infra
  bookmarks:
    - Section 1:
      - Scanner:
        - icon: mdi-scanner
          href: scanner.local
  services: []

  widgets:
    - kubernetes:
        cluster:
          cpu: true
          label: cluster
          memory: true
          show: true
          showLabel: true
        nodes:
          cpu: true
          memory: true
          show: true
          showLabel: true
    - openmeteo:
        cache: 5
        format:
          maximumFractionDigits: 1
        latitude: 49.488888
        longitude: 8.469167
        timezone: Europe/Berlin
        units: metric
