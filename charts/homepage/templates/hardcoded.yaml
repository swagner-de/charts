{{- define "hardcoded" -}}
defaultPodOptions:
  securityContext:
    runAsUser: 1000
    runAsGroup: 1000
    fsGroup: 1000
    fsGroupChangePolicy: OnRootMismatch

# Configure options applied to all pods
controllers:
  main:
    automountServiceAccountToken: true
    containers:
      main:
        enabled: true
        securityContext:
          readOnlyRootFilesystem: true
          allowPrivilegeEscalation: false
          seccompProfile:
            type: RuntimeDefault
          capabilities:
            drop:
            - ALL
        image:
          repository: ghcr.io/gethomepage/homepage
          tag: {{ .Chart.AppVersion | quote }}
        envFrom:
{{- if ne (len .Values.secretReplacements) 0  }}
        - secret: replacements
{{- end }}
{{- if ne (len .Values.additionalSecrets) 0  }}
{{- range .Values.additionalSecrets }}
        - secret: {{ .name }}
{{- end }}
{{- end }}
        probes:
          liveness: &probe
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /
                port: 3000
              initialDelaySeconds: 3
              periodSeconds: 10
              timeoutSeconds: 5
              successThreshold: 1
              failureThreshold: 3
          readiness: *probe
          startup: *probe
  
persistence:
  miscdata:
    type: emptyDir
    advancedMounts:
      main:
        main:
        - path: /app/config

  config:
    type: configMap
    identifier: config
    advancedMounts:
      main:
        main:
{{- range $key, $config := .Values.config }}
        - path: /app/config/{{ $key }}.yaml
          subPath: {{ $key }}.yaml
{{- end }}

service:
  main:
    controller: main
    primary: true
    ports:
      http:
        port: 3000
        protocol: TCP

secrets:
  replacements:
    enabled: {{ ne (len .Values.secretReplacements) 0 }}
    stringData:
{{- range $key, $value := .Values.secretReplacements }}
      {{ $key }}: {{ $value | quote }}
{{- end }}

configMaps:
  config:
    enabled: true
    data:
{{- range $key, $config := .Values.config }}
      {{ $key }}.yaml: |
{{ $config | toYaml | indent 8 }}
{{- end }}

serviceAccount:
  default:
    enabled: true

rbac:
  roles:
    homepage:
      type: ClusterRole
      rules:
      - apiGroups: [""]
        resources: ["namespaces", "pods", "nodes"]
        verbs: ["get", "list"]
      - apiGroups: ["extensions", "networking.k8s.io"]
        resources: ["ingresses"]
        verbs: ["get", "list"]
      - apiGroups: ["traefik.io"]
        resources: ["ingressroutes"]
        verbs: ["get", "list"]
      - apiGroups: ["gateway.networking.k8s.io"]
        resources: ["gateways", "httproutes"]
        verbs: ["get", "list"]
      - apiGroups: ["metrics.k8s.io"]
        resources: ["nodes", "pods"]
        verbs: ["get", "list"]
  bindings:
    homepage:
      type: ClusterRoleBinding
      roleRef:
        identifier: homepage
      subjects:
        - identifier: default

{{ end }}

{{- $ctx := deepCopy . -}}
{{- $_ := include "hardcoded" . | fromYaml | mergeOverwrite $ctx.Values -}}

{{ include "bjw-s.common.loader.all" $ctx }}
