# -- Grafana integration (requires Grafana sidecar for auto-discovery)
grafana:
  # -- Enable Grafana datasource and dashboard provisioning via sidecar
  enabled: false

# -- Prometheus metrics and ServiceMonitor
metrics:
  # -- Enable ServiceMonitor resources (requires Prometheus Operator CRDs)
  enabled: false
  # -- Additional Grafana plugins required (add to your Grafana deployment)
  # plugins:
  #   - ovhcloud-akvorado-datasource
  #   - netsage-sankey-panel
