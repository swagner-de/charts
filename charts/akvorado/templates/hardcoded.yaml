{{- if and .Values.geoip.enabled (not (or .Values.existingSecret .Values.geoip.existingSecret)) }}
{{- fail "geoip.existingSecret (or top-level existingSecret) must be set when geoip.enabled is true" }}
{{- end }}
{{- define "hardcoded" -}}
global:
  alwaysAppendIdentifierToResourceName: true

defaultPodOptions:
  securityContext:
    runAsNonRoot: true
    runAsUser: 65534
    runAsGroup: 65534
    fsGroup: 65534
    fsGroupChangePolicy: OnRootMismatch

controllers:
  main:
    enabled: false

  orchestrator:
    type: deployment
    replicas: 1
    initContainers:
      wait-for-deps:
        image:
          # renovate: image=busybox
          repository: busybox
          tag: "1.37.0"
        command: ["sh", "-c"]
        args:
          - |
            echo "Waiting for Kafka and ClickHouse..."
            until nc -z {{ .Release.Name }}-kafka 9092 && nc -z {{ .Release.Name }}-clickhouse 9000; do
              sleep 2
            done
            echo "Dependencies ready"
        securityContext:
          readOnlyRootFilesystem: true
          allowPrivilegeEscalation: false
          seccompProfile:
            type: RuntimeDefault
          capabilities:
            drop:
            - ALL
{{- if .Values.existingSecret }}
      render-config:
        dependsOn:
          - wait-for-deps
        image:
          # renovate: image=busybox
          repository: busybox
          tag: "1.37.0"
        command: ["sh", "-c"]
        args:
          - |
            COMMUNITY=$(cat /secrets/snmpCommunity)
            sed "s/__SNMP_COMMUNITY__/${COMMUNITY}/g" /config-template/akvorado.yaml > /config/akvorado.yaml
        securityContext:
          readOnlyRootFilesystem: true
          allowPrivilegeEscalation: false
          seccompProfile:
            type: RuntimeDefault
          capabilities:
            drop:
            - ALL
{{- end }}
    containers:
      main:
        image:
          repository: ghcr.io/akvorado/akvorado
          tag: {{ .Chart.AppVersion | quote }}
        args:
          - orchestrator
          - /etc/akvorado/akvorado.yaml
        securityContext:
          readOnlyRootFilesystem: true
          allowPrivilegeEscalation: false
          seccompProfile:
            type: RuntimeDefault
          capabilities:
            drop:
            - ALL
        probes:
          liveness: &orchestratorProbe
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /api/v0/orchestrator/healthcheck
                port: 8080
              initialDelaySeconds: 5
              periodSeconds: 10
              timeoutSeconds: 3
              failureThreshold: 3
          readiness: *orchestratorProbe
          startup:
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /api/v0/orchestrator/healthcheck
                port: 8080
              initialDelaySeconds: 5
              periodSeconds: 5
              timeoutSeconds: 3
              failureThreshold: 30
{{- if .Values.geoip.enabled }}
      geoipupdate:
        image:
{{- if eq .Values.geoip.provider "maxmind" }}
          repository: ghcr.io/maxmind/geoipupdate
          tag: v7
{{- else }}
          repository: ghcr.io/akvorado/ipinfo-geoipupdate
          tag: latest
{{- end }}
        workingDir: /usr/share/GeoIP
        securityContext:
          readOnlyRootFilesystem: false
          allowPrivilegeEscalation: false
          seccompProfile:
            type: RuntimeDefault
          capabilities:
            drop:
            - ALL
        env:
{{- if eq .Values.geoip.provider "maxmind" }}
          - name: GEOIPUPDATE_ACCOUNT_ID
            valueFrom:
              secretKeyRef:
                name: {{ .Values.existingSecret | default .Values.geoip.existingSecret }}
                key: {{ if .Values.existingSecret }}maxmindAccountId{{ else }}GEOIPUPDATE_ACCOUNT_ID{{ end }}
          - name: GEOIPUPDATE_LICENSE_KEY
            valueFrom:
              secretKeyRef:
                name: {{ .Values.existingSecret | default .Values.geoip.existingSecret }}
                key: {{ if .Values.existingSecret }}maxmindLicenseKey{{ else }}GEOIPUPDATE_LICENSE_KEY{{ end }}
          - name: GEOIPUPDATE_EDITION_IDS
            value: {{ .Values.geoip.maxmindEditionIds | quote }}
          - name: GEOIPUPDATE_DB_DIR
            value: /usr/share/GeoIP
          - name: GEOIPUPDATE_FREQUENCY
            value: "24"
{{- else }}
          - name: IPINFO_TOKEN
            valueFrom:
              secretKeyRef:
                name: {{ .Values.existingSecret | default .Values.geoip.existingSecret }}
                key: {{ if .Values.existingSecret }}ipInfoToken{{ else }}IPINFO_TOKEN{{ end }}
          - name: IPINFO_DATABASES
            value: "asn country"
          - name: UPDATE_FREQUENCY
            value: "86400"
{{- end }}
        probes:
          liveness:
            enabled: false
          readiness:
            enabled: false
          startup:
            enabled: false
{{- end }}

  inlet:
    type: deployment
    replicas: {{ .Values.inlet.replicas }}
    initContainers:
      wait-for-orchestrator:
        image:
          repository: busybox
          tag: "1.37.0"
        command: ["sh", "-c"]
        args:
          - |
            echo "Waiting for orchestrator..."
            until nc -z {{ .Release.Name }}-orchestrator 8080; do
              sleep 2
            done
            echo "Orchestrator ready"
        securityContext:
          readOnlyRootFilesystem: true
          allowPrivilegeEscalation: false
          seccompProfile:
            type: RuntimeDefault
          capabilities:
            drop:
            - ALL
    containers:
      main:
        image:
          repository: ghcr.io/akvorado/akvorado
          tag: {{ .Chart.AppVersion | quote }}
        args:
          - inlet
          - http://{{ .Release.Name }}-orchestrator:8080
        securityContext:
          readOnlyRootFilesystem: true
          allowPrivilegeEscalation: false
          seccompProfile:
            type: RuntimeDefault
          capabilities:
            drop:
            - ALL
            add:
            - NET_BIND_SERVICE
        probes:
          liveness: &inletProbe
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /api/v0/inlet/healthcheck
                port: 8080
              initialDelaySeconds: 5
              periodSeconds: 10
              timeoutSeconds: 3
              failureThreshold: 3
          readiness: *inletProbe
          startup:
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /api/v0/inlet/healthcheck
                port: 8080
              initialDelaySeconds: 5
              periodSeconds: 5
              timeoutSeconds: 3
              failureThreshold: 30

  outlet:
    type: deployment
    replicas: {{ .Values.outlet.replicas }}
    initContainers:
      wait-for-orchestrator:
        image:
          repository: busybox
          tag: "1.37.0"
        command: ["sh", "-c"]
        args:
          - |
            echo "Waiting for orchestrator..."
            until nc -z {{ .Release.Name }}-orchestrator 8080; do
              sleep 2
            done
            echo "Orchestrator ready"
        securityContext:
          readOnlyRootFilesystem: true
          allowPrivilegeEscalation: false
          seccompProfile:
            type: RuntimeDefault
          capabilities:
            drop:
            - ALL
    containers:
      main:
        image:
          repository: ghcr.io/akvorado/akvorado
          tag: {{ .Chart.AppVersion | quote }}
        args:
          - outlet
          - http://{{ .Release.Name }}-orchestrator:8080
        securityContext:
          readOnlyRootFilesystem: true
          allowPrivilegeEscalation: false
          seccompProfile:
            type: RuntimeDefault
          capabilities:
            drop:
            - ALL
        probes:
          liveness: &outletProbe
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /api/v0/outlet/healthcheck
                port: 8080
              initialDelaySeconds: 5
              periodSeconds: 10
              timeoutSeconds: 3
              failureThreshold: 3
          readiness: *outletProbe
          startup:
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /api/v0/outlet/healthcheck
                port: 8080
              initialDelaySeconds: 5
              periodSeconds: 5
              timeoutSeconds: 3
              failureThreshold: 30

  console:
    type: deployment
    replicas: {{ .Values.console.replicas }}
    initContainers:
      wait-for-orchestrator:
        image:
          repository: busybox
          tag: "1.37.0"
        command: ["sh", "-c"]
        args:
          - |
            echo "Waiting for orchestrator..."
            until nc -z {{ .Release.Name }}-orchestrator 8080; do
              sleep 2
            done
            echo "Orchestrator ready"
        securityContext:
          readOnlyRootFilesystem: true
          allowPrivilegeEscalation: false
          seccompProfile:
            type: RuntimeDefault
          capabilities:
            drop:
            - ALL
    containers:
      main:
        image:
          repository: ghcr.io/akvorado/akvorado
          tag: {{ .Chart.AppVersion | quote }}
        args:
          - console
          - http://{{ .Release.Name }}-orchestrator:8080
        securityContext:
          readOnlyRootFilesystem: true
          allowPrivilegeEscalation: false
          seccompProfile:
            type: RuntimeDefault
          capabilities:
            drop:
            - ALL
        probes:
          liveness: &consoleProbe
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /api/v0/console/healthcheck
                port: 8080
              initialDelaySeconds: 5
              periodSeconds: 10
              timeoutSeconds: 3
              failureThreshold: 3
          readiness: *consoleProbe
          startup:
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /api/v0/console/healthcheck
                port: 8080
              initialDelaySeconds: 5
              periodSeconds: 5
              timeoutSeconds: 3
              failureThreshold: 30

  clickhouse:
    type: statefulset
    replicas: 1
    containers:
      main:
        image:
          repository: clickhouse/clickhouse-server
          tag: "26.3"
        securityContext:
          readOnlyRootFilesystem: false
          allowPrivilegeEscalation: false
          seccompProfile:
            type: RuntimeDefault
          capabilities:
            drop:
            - ALL
            add:
            - SYS_NICE
        env:
          - name: CLICKHOUSE_SKIP_USER_SETUP
            value: "1"
        probes:
          liveness: &clickhouseProbe
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /ping
                port: 8123
              initialDelaySeconds: 10
              periodSeconds: 20
              timeoutSeconds: 3
              failureThreshold: 3
          readiness: *clickhouseProbe
          startup:
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /ping
                port: 8123
              initialDelaySeconds: 10
              periodSeconds: 10
              timeoutSeconds: 3
              failureThreshold: 30
    pod:
      securityContext:
        runAsNonRoot: false
        runAsUser: 101
        runAsGroup: 101
        fsGroup: 101

  kafka:
    type: statefulset
    replicas: 1
    containers:
      main:
        image:
          repository: apache/kafka
          tag: "4.2.0"
        securityContext:
          readOnlyRootFilesystem: false
          allowPrivilegeEscalation: false
          seccompProfile:
            type: RuntimeDefault
          capabilities:
            drop:
            - ALL
        env:
          - name: KAFKA_NODE_ID
            value: "1"
          - name: KAFKA_PROCESS_ROLES
            value: "controller,broker"
          - name: KAFKA_HEAP_OPTS
            value: "-Xmx{{ .Values.kafka.heapSize }} -Xms{{ .Values.kafka.heapSize }}"
          - name: KAFKA_CONTROLLER_QUORUM_VOTERS
            value: "1@localhost:9093"
          - name: KAFKA_LISTENERS
            value: "CLIENT://:9092,CONTROLLER://:9093"
          - name: KAFKA_LISTENER_SECURITY_PROTOCOL_MAP
            value: "CLIENT:PLAINTEXT,CONTROLLER:PLAINTEXT"
          - name: KAFKA_ADVERTISED_LISTENERS
            value: "CLIENT://{{ .Release.Name }}-kafka:9092"
          - name: KAFKA_CONTROLLER_LISTENER_NAMES
            value: "CONTROLLER"
          - name: KAFKA_INTER_BROKER_LISTENER_NAME
            value: "CLIENT"
          - name: KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR
            value: "1"
          - name: KAFKA_TRANSACTION_STATE_LOG_MIN_ISR
            value: "1"
          - name: KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR
            value: "1"
          - name: KAFKA_LOG_DIRS
            value: "/var/lib/kafka/data"
          - name: KAFKA_DELETE_TOPIC_ENABLE
            value: "true"
        probes:
          liveness:
            enabled: true
            custom: true
            spec:
              tcpSocket:
                port: 9092
              initialDelaySeconds: 30
              periodSeconds: 20
              timeoutSeconds: 5
              failureThreshold: 3
          readiness:
            enabled: true
            custom: true
            spec:
              tcpSocket:
                port: 9092
              initialDelaySeconds: 20
              periodSeconds: 20
              timeoutSeconds: 5
              failureThreshold: 3
          startup:
            enabled: true
            custom: true
            spec:
              tcpSocket:
                port: 9092
              initialDelaySeconds: 10
              periodSeconds: 5
              timeoutSeconds: 5
              failureThreshold: 30
    pod:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000

service:
  orchestrator:
    controller: orchestrator
    ports:
      http:
        port: 8080
        protocol: TCP

  inlet:
    controller: inlet
    ports:
      http:
        port: 8080
        protocol: TCP
      netflow:
        port: 2055
        protocol: UDP
      ipfix:
        port: 4739
        protocol: UDP
      sflow:
        port: 6343
        protocol: UDP

  outlet:
    controller: outlet
    ports:
      http:
        port: 8080
        protocol: TCP
      bmp:
        port: 10179
        protocol: TCP

  console:
    controller: console
    ports:
      http:
        port: 8080
        protocol: TCP

  clickhouse:
    controller: clickhouse
    ports:
      native:
        port: 9000
        protocol: TCP
      http:
        port: 8123
        protocol: TCP

  kafka:
    controller: kafka
    ports:
      client:
        port: 9092
        protocol: TCP

serviceMonitor:
  orchestrator:
    serviceName: {{ printf "%s-orchestrator" .Release.Name | quote }}
    endpoints:
      - port: http
        scheme: http
        path: /api/v0/orchestrator/metrics
        interval: 30s
  inlet:
    serviceName: {{ printf "%s-inlet" .Release.Name | quote }}
    endpoints:
      - port: http
        scheme: http
        path: /api/v0/inlet/metrics
        interval: 30s
  outlet:
    serviceName: {{ printf "%s-outlet" .Release.Name | quote }}
    endpoints:
      - port: http
        scheme: http
        path: /api/v0/outlet/metrics
        interval: 30s
  console:
    serviceName: {{ printf "%s-console" .Release.Name | quote }}
    endpoints:
      - port: http
        scheme: http
        path: /api/v0/console/metrics
        interval: 30s

persistence:
  akvorado-config:
    type: configMap
    identifier: akvorado-config
    advancedMounts:
      orchestrator:
{{- if .Values.existingSecret }}
        render-config:
          - path: /config-template/akvorado.yaml
            subPath: akvorado.yaml
{{- else }}
        main:
          - path: /etc/akvorado/akvorado.yaml
            subPath: akvorado.yaml
{{- end }}

{{- if .Values.existingSecret }}
  akvorado-secret:
    type: secret
    name: {{ .Values.existingSecret }}
    advancedMounts:
      orchestrator:
        render-config:
          - path: /secrets

  akvorado-rendered-config:
    type: emptyDir
    advancedMounts:
      orchestrator:
        render-config:
          - path: /config
        main:
          - path: /etc/akvorado
{{- end }}

  clickhouse-config:
    type: configMap
    identifier: clickhouse-config
    advancedMounts:
      clickhouse:
        main:
          - path: /etc/clickhouse-server/config.d/akvorado.xml
            subPath: server.xml
          - path: /etc/clickhouse-server/users.d/akvorado.xml
            subPath: users.xml

  clickhouse-data:
    type: persistentVolumeClaim
    size: {{ .Values.clickhouse.persistence.size }}
{{- if .Values.clickhouse.persistence.storageClass }}
    storageClass: {{ .Values.clickhouse.persistence.storageClass | quote }}
{{- end }}
    accessMode: ReadWriteOnce
    advancedMounts:
      clickhouse:
        main:
          - path: /var/lib/clickhouse

  kafka-data:
    type: persistentVolumeClaim
    size: {{ .Values.kafka.persistence.size }}
{{- if .Values.kafka.persistence.storageClass }}
    storageClass: {{ .Values.kafka.persistence.storageClass | quote }}
{{- end }}
    accessMode: ReadWriteOnce
    advancedMounts:
      kafka:
        main:
          - path: /var/lib/kafka/data

  console-db:
    type: emptyDir
    advancedMounts:
      console:
        main:
          - path: /run/akvorado

  outlet-state:
    type: emptyDir
    advancedMounts:
      outlet:
        main:
          - path: /run/akvorado

  tmp-orchestrator:
    type: emptyDir
    advancedMounts:
      orchestrator:
        main:
          - path: /tmp

  tmp-inlet:
    type: emptyDir
    advancedMounts:
      inlet:
        main:
          - path: /tmp

  tmp-outlet:
    type: emptyDir
    advancedMounts:
      outlet:
        main:
          - path: /tmp

  tmp-console:
    type: emptyDir
    advancedMounts:
      console:
        main:
          - path: /tmp

{{- if .Values.geoip.enabled }}
  geoip:
    type: emptyDir
    advancedMounts:
      orchestrator:
        geoipupdate:
          - path: /usr/share/GeoIP
        main:
          - path: /usr/share/GeoIP
{{- end }}

configMaps:
  akvorado-config:
    enabled: true
    data:
      akvorado.yaml: |
        kafka:
          topic: flows
          brokers:
            - {{ .Release.Name }}-kafka:9092
          topic-configuration:
            num-partitions: {{ .Values.kafka.topicPartitions }}
            replication-factor: 1
            config-entries:
              segment.bytes: 1073741824
              retention.ms: {{ .Values.kafka.retentionMs | int64 }}
              cleanup.policy: delete
              compression.type: producer
        {{- if .Values.geoip.enabled }}
        geoip:
          optional: true
          {{- if eq .Values.geoip.provider "maxmind" }}
          asn-database:
            - /usr/share/GeoIP/GeoLite2-ASN.mmdb
          geo-database:
            - /usr/share/GeoIP/GeoLite2-Country.mmdb
          {{- else }}
          asn-database:
            - /usr/share/GeoIP/asn.mmdb
          geo-database:
            - /usr/share/GeoIP/country.mmdb
          {{- end }}
        {{- else }}
        geoip:
          optional: true
        {{- end }}
        clickhousedb:
          servers:
            - {{ .Release.Name }}-clickhouse:9000
        clickhouse:
          orchestrator-url: http://{{ .Release.Name }}-orchestrator:8080
          {{- if .Values.akvorado.asns }}
          asns: {{ .Values.akvorado.asns | toYaml | nindent 12 }}
          {{- end }}
          {{- if .Values.akvorado.networks }}
          networks: {{ .Values.akvorado.networks | toYaml | nindent 12 }}
          {{- end }}
          {{- if .Values.akvorado.networkSources }}
          network-sources: {{ .Values.akvorado.networkSources | toYaml | nindent 12 }}
          {{- else }}
          network-sources: []
          {{- end }}
          {{- if .Values.akvorado.resolutions }}
          resolutions: {{ .Values.akvorado.resolutions | toYaml | nindent 12 }}
          {{- end }}
        inlet: {{ .Values.akvorado.inlet | toYaml | nindent 10 }}
        outlet:
          metadata:
            providers:
              - type: snmp
                credentials:
                  "::/0":
                    communities: {{ if .Values.existingSecret }}__SNMP_COMMUNITY__{{ else }}{{ .Values.snmp.community | quote }}{{ end }}
          {{- with .Values.akvorado.outlet.routing }}
          routing: {{ . | toYaml | nindent 12 }}
          {{- end }}
          {{- with .Values.akvorado.outlet.core }}
          core: {{ . | toYaml | nindent 12 }}
          {{- end }}
        console: {{ .Values.akvorado.console | toYaml | nindent 10 }}

  clickhouse-config:
    enabled: true
    data:
      server.xml: |
        <clickhouse>
          <listen_host>0.0.0.0</listen_host>
          <http_port>8123</http_port>
          <tcp_port>9000</tcp_port>
{{- if .Values.clickhouse.maxMemoryUsage }}
          <max_server_memory_usage>{{ .Values.clickhouse.maxMemoryUsage }}</max_server_memory_usage>
{{- end }}
        </clickhouse>
      users.xml: |
        <clickhouse>
          <users>
            <{{ .Values.clickhouse.auth.username }}>
              <password>{{ .Values.clickhouse.auth.password }}</password>
              <networks>
                <ip>::/0</ip>
              </networks>
              <profile>default</profile>
              <quota>default</quota>
              <access_management>1</access_management>
            </{{ .Values.clickhouse.auth.username }}>
            <default>
              <password></password>
              <networks>
                <ip>127.0.0.1</ip>
                <ip>::1</ip>
              </networks>
              <profile>default</profile>
              <quota>default</quota>
            </default>
          </users>
        </clickhouse>

{{- if .Values.networkPolicies.enabled }}
networkpolicies:
  kafka:
    controller: kafka
    policyTypes:
      - Ingress
    rules:
      ingress:
        - ports:
            - port: 9092
              protocol: TCP
          from:
            - podSelector:
                matchLabels:
                  app.kubernetes.io/controller: inlet
                  app.kubernetes.io/instance: {{ .Release.Name }}
            - podSelector:
                matchLabels:
                  app.kubernetes.io/controller: outlet
                  app.kubernetes.io/instance: {{ .Release.Name }}
            - podSelector:
                matchLabels:
                  app.kubernetes.io/controller: orchestrator
                  app.kubernetes.io/instance: {{ .Release.Name }}

  clickhouse:
    controller: clickhouse
    policyTypes:
      - Ingress
      - Egress
    rules:
      ingress:
        - ports:
            - port: 9000
              protocol: TCP
            - port: 8123
              protocol: TCP
          from:
            - podSelector:
                matchLabels:
                  app.kubernetes.io/controller: outlet
                  app.kubernetes.io/instance: {{ .Release.Name }}
            - podSelector:
                matchLabels:
                  app.kubernetes.io/controller: console
                  app.kubernetes.io/instance: {{ .Release.Name }}
            - podSelector:
                matchLabels:
                  app.kubernetes.io/controller: orchestrator
                  app.kubernetes.io/instance: {{ .Release.Name }}
      egress:
        - ports:
            - port: 8080
              protocol: TCP
          to:
            - podSelector:
                matchLabels:
                  app.kubernetes.io/controller: orchestrator
                  app.kubernetes.io/instance: {{ .Release.Name }}
        - ports:
            - port: 53
              protocol: UDP
            - port: 53
              protocol: TCP

  orchestrator:
    controller: orchestrator
    policyTypes:
      - Ingress
      - Egress
    rules:
      ingress:
        - ports:
            - port: 8080
              protocol: TCP
          from:
            - podSelector:
                matchLabels:
                  app.kubernetes.io/controller: inlet
                  app.kubernetes.io/instance: {{ .Release.Name }}
            - podSelector:
                matchLabels:
                  app.kubernetes.io/controller: outlet
                  app.kubernetes.io/instance: {{ .Release.Name }}
            - podSelector:
                matchLabels:
                  app.kubernetes.io/controller: console
                  app.kubernetes.io/instance: {{ .Release.Name }}
            - podSelector:
                matchLabels:
                  app.kubernetes.io/controller: clickhouse
                  app.kubernetes.io/instance: {{ .Release.Name }}
      egress:
        - ports:
            - port: 9092
              protocol: TCP
          to:
            - podSelector:
                matchLabels:
                  app.kubernetes.io/controller: kafka
                  app.kubernetes.io/instance: {{ .Release.Name }}
        - ports:
            - port: 9000
              protocol: TCP
          to:
            - podSelector:
                matchLabels:
                  app.kubernetes.io/controller: clickhouse
                  app.kubernetes.io/instance: {{ .Release.Name }}
        - ports:
            - port: 53
              protocol: UDP
            - port: 53
              protocol: TCP
{{- if .Values.geoip.enabled }}
        - ports:
            - port: 443
              protocol: TCP
{{- end }}

  inlet:
    controller: inlet
    policyTypes:
      - Ingress
      - Egress
    rules:
      ingress:
        - ports:
            - port: 2055
              protocol: UDP
            - port: 4739
              protocol: UDP
            - port: 6343
              protocol: UDP
          from:
{{- range .Values.networkPolicies.inletAllowCIDR }}
