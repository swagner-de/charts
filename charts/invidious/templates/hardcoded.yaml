{{- define "hardcoded" -}}

{{ if and .Values.cnpg.enabled .Values.postgres.enabled }}
{{ fail "postgres cannot be used via chart and CNPG"}}
{{- end }}

{{- $configType := .Values.configSource.type | default "configMap" }}
{{- if not (or (eq $configType "configMap") (eq $configType "pvc")) }}
{{- fail (printf "configSource.type must be 'configMap' or 'pvc', got %q" $configType) }}
{{- end }}
{{- $isPvc := eq $configType "pvc" }}

global:
  createDefaultServiceAccount: false
  alwaysAppendIdentifierToResourceName: true

defaultPodOptions:
  securityContext:
    runAsNonRoot: true
    runAsUser: 65534
    runAsGroup: 65534
    fsGroup: 65534
    fsGroupChangePolicy: OnRootMismatch

controllers:
  main:
    enabled: true
    strategy: RollingUpdate
{{- if $isPvc }}
    initContainers:
      seed-config:
        image:
          repository: quay.io/invidious/invidious
          tag: {{ .Chart.AppVersion | quote }}
        command: ["sh", "-c"]
        args:
        - |
          set -e
          # Refresh image-provided SQL templates so they stay in sync with the app version.
          rm -rf /seed/sql
          cp -r /invidious/config/sql /seed/sql
          # Seed config.yml from chart-rendered default only on first start.
          if [ ! -f /seed/config.yml ]; then
            cp /default/config.yml /seed/config.yml
            echo "Seeded config.yml from default"
          else
            echo "config.yml already present; not overwriting"
          fi
        securityContext:
          readOnlyRootFilesystem: true
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
          seccompProfile:
            type: RuntimeDefault
{{- end }}
    containers:
      main:
        image:
          repository: quay.io/invidious/invidious
          tag: {{ .Chart.AppVersion | quote }}
        envFrom:
{{- if not .Values.companionKey.existingSecret }}
          - secretRef:
              identifier: invidious-companion-key
{{- end }}
{{- if not .Values.hmacKey.existingSecret }}
          - secretRef:
              identifier: invidious-hmac-key
{{- end }}
        env:
{{- if .Values.companionKey.existingSecret }}
          INVIDIOUS_INVIDIOUS_COMPANION_KEY:
            secretKeyRef:
              name: {{ .Values.companionKey.existingSecret.name }}
              key: {{ .Values.companionKey.existingSecret.key }}
{{- end }}
{{- if .Values.hmacKey.existingSecret }}
          INVIDIOUS_HMAC_KEY:
            secretKeyRef:
              name: {{ .Values.hmacKey.existingSecret.name }}
              key: {{ .Values.hmacKey.existingSecret.key }}
{{- end }}
{{ if .Values.cnpg.enabled }}
{{- $cnpgName := .Values.cnpg.clusterName }}
{{- if .Values.cnpg.prependReleaseName }}
{{- if contains .Chart.Name .Release.Name }}
{{- $cnpgName = printf "%s-%s" .Release.Name .Values.cnpg.clusterName }}
{{- else }}
{{- $cnpgName = printf "%s-%s-%s" .Release.Name .Chart.Name .Values.cnpg.clusterName }}
{{- end }}
{{- end }}
          DB_FQDN_URI:
            secretKeyRef:
              name: {{ $cnpgName }}-app
              key: fqdn-uri
          INVIDIOUS_DATABASE_URL:
            value: $(DB_FQDN_URI)?sslmode=verify-full&sslrootcert=/certs/ca.crt
            dependsOn:
              - DB_FQDN_URI
{{- end }}
{{ if .Values.postgres.enabled }}
          INVIDIOUS_DATABASE_URL:
            value: postgres://{{ .Values.postgres.auth.username }}:{{ .Values.postgres.auth.password }}@{{ printf "%s-postgres" .Release.Name }}:5432/{{ .Values.postgres.auth.database }}
{{ end }}
        securityContext:
          readOnlyRootFilesystem: true
          allowPrivilegeEscalation: false
          capabilities:
              drop:
              - ALL
          seccompProfile:
              type: RuntimeDefault
        probes:
          liveness: &probe
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /api/v1/stats
                port: 3000
              initialDelaySeconds: 10
              periodSeconds: 30
              timeoutSeconds: 5
              failureThreshold: 2
          readiness: *probe
  companion:
    enabled: true
    containers:
      main:
        image:
          # renovate: image=quay.io/invidious/invidious-companion
          repository: quay.io/invidious/invidious-companion
          tag: latest  # TODO: pin to a specific version once available
{{- if .Values.companionKey.existingSecret }}
        env:
          SERVER_SECRET_KEY:
            secretKeyRef:
              name: {{ .Values.companionKey.existingSecret.name }}
              key: {{ .Values.companionKey.existingSecret.key }}
{{- else }}
        envFrom:
          - secretRef:
              identifier: invidious-companion-key
        env:
          SERVER_SECRET_KEY: $(INVIDIOUS_INVIDIOUS_COMPANION_KEY)
{{- end }}
        securityContext:
          readOnlyRootFilesystem: true
          allowPrivilegeEscalation: false
          capabilities:
              drop:
              - ALL
          seccompProfile:
              type: RuntimeDefault

service:
  main:
    controller: main
    primary: true
    ports:
      http:
        port: 3000
        protocol: TCP
  companion:
    controller: companion
    ports:
      http:
        port: 8282
        protocol: TCP

persistence:
  cache:
    advancedMounts:
      main:
        companion:
        - path: /var/tmp/

{{- if $isPvc }}
  config:
    enabled: true
    type: persistentVolumeClaim
    accessMode: {{ .Values.configSource.pvc.accessMode }}
    size: {{ .Values.configSource.pvc.size }}
{{- with .Values.configSource.pvc.storageClass }}
    storageClass: {{ . | quote }}
{{- end }}
    advancedMounts:
      main:
        main:
        - path: /invidious/config
        seed-config:
        - path: /seed
  config-default:
    type: configMap
    identifier: config
    advancedMounts:
      main:
        seed-config:
        - path: /default/config.yml
          subPath: config.yml
{{- else }}
  config:
    type: configMap
    identifier: config
    advancedMounts:
      main:
        main:
        - path: /invidious/config/config.yml
          subPath: config.yml
{{- end }}

{{ if .Values.cnpg.enabled }}
{{- $cnpgName := .Values.cnpg.clusterName }}
{{- if .Values.cnpg.prependReleaseName }}
{{- if contains .Chart.Name .Release.Name }}
{{- $cnpgName = printf "%s-%s" .Release.Name .Values.cnpg.clusterName }}
{{- else }}
{{- $cnpgName = printf "%s-%s-%s" .Release.Name .Chart.Name .Values.cnpg.clusterName }}
{{- end }}
{{- end }}
  certs:
    type: secret
    name: {{ $cnpgName }}-ca
    advancedMounts:
      main:
        main:
        - path: /certs/ca.crt
          subPath: ca.crt
{{ end }}

configMaps:
  config:
    enabled: true
    data:
      config.yml: |
        check_tables: true
        invidious_companion:
          - private_url: "http://{{ .Release.Name }}-companion:8282/companion"
{{- if .Values.companion.publicUrl }}
            public_url: {{ .Values.companion.publicUrl }}
{{- end }}
{{ .Values.config | toYaml | indent 8 }}

secrets:
  dummy:
    enabled: false
{{- if not .Values.companionKey.existingSecret }}
  invidious-companion-key:
    stringData:
      INVIDIOUS_INVIDIOUS_COMPANION_KEY: {{ .Values.companionKey.value }}
{{- end }}
{{- if not .Values.hmacKey.existingSecret }}
  invidious-hmac-key:
    stringData:
      INVIDIOUS_HMAC_KEY: {{ .Values.hmacKey.value }}
{{- end }}
{{ end }}

{{- $ctx := deepCopy . -}}
{{- $_ := include "hardcoded" . | fromYaml | mergeOverwrite $ctx.Values -}}

{{ include "bjw-s.common.loader.all" $ctx }}
