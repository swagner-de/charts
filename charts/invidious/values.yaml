persistence:
  cache:
    type: emptyDir

ingress:
  main:
    enabled: false

postgres:
  enabled: true
  auth:
    username: &postgresUser invidious
    database: &postgresDB invidious
    password: &postgresPassword "CHANGEME"  # REQUIRED: set your database password
  persistence:
    enabled: true
    size: 2Gi
    accessMode: ReadWriteOnce

companionKey:
  value: "CHANGEME_16CHARS"  # REQUIRED: set a shared secret (exactly 16 characters)
  # existingSecret:
  #   name: invidious-companion-key
  #   key: key

hmacKey:
  value: "CHANGEME"  # REQUIRED: set an HMAC signing key
  # existingSecret:
  #   name: ""
  #   key: ""

companion: {}
  # publicUrl: https://companion.mydomain.example

config:
  external_port: 443
  domain: mydomain.example
  https_only: true
  hsts: true
  log_level: debug
  popular_enabled: true
  statistics_enabled: true
  registration_enabled: true
  login_enabled: true
  captcha_enabled: false
  enable_user_notifications: true

cnpg:
  # In case CNPG operator is used, provide the cluster definition via additionalObjects
  # and set the postgresql.enabled to false
  # The cluster name must be provided for the database to be auto-configured
  enabled: false
  clusterName: invidious

