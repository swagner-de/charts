# -- RTP port range configuration
rtp:
  # -- First RTP port
  start: 10000
  # -- Last RTP port
  end: 10099
  # -- STUN server for NAT traversal (e.g. "stun.l.google.com:19302")
  # stunAddr:

# -- Persistence configuration
persistence:
  # -- AstDB persistence (internal state database)
  astdb:
    # -- Enable AstDB persistence
    enabled: true
    # -- Volume size
    size: 100Mi
    # -- Storage access mode
    accessMode: ReadWriteOnce
  # -- TLS certificate secret mount
  tls:
    # -- Enable TLS certificate mount
    enabled: false

