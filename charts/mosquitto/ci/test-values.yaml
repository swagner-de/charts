rawResources:
  cert:
    enabled: true
    manifest:
      apiVersion: cert-manager.io/v1
      kind: Certificate
      spec:
        dnsNames:
          - mqtt.example.com
        issuerRef:
          group: cert-manager.io
          kind: ClusterIssuer
          name: test-issuer
        secretName: mosquitto-tls
        usages:
          - digital signature
          - key encipherment
