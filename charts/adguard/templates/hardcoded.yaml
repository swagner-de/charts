{{- define "hardcoded" -}}

defaultPodOptions:
  securityContext:
    runAsNonRoot: true
    runAsUser: 1000
    runAsGroup: 1000
    fsGroup: 1000
    fsGroupChangePolicy: OnRootMismatch

# Configure options applied to all pods
controllers:
  main:
    containers:
      main:
        enabled: true
        securityContext:
          readOnlyRootFilesystem: true
          allowPrivilegeEscalation: false
          privileged: false
          seccompProfile:
            type: RuntimeDefault
          capabilities:
            drop:
            - ALL
            add:
            - NET_BIND_SERVICE
        image:
          repository: 11notes/adguard
          tag: {{ .Chart.AppVersion | quote }}
        probes:
          liveness: &probe
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /
                port: 3000
              initialDelaySeconds: 5
              periodSeconds: 10
              timeoutSeconds: 5
              successThreshold: 1
              failureThreshold: 3
          readiness: *probe
          startup: *probe
      exporter:
        enabled: true
        image:
          repository: ghcr.io/henrywhitaker3/adguard-exporter
          tag: v1.2.0
        env:
          ADGUARD_SERVERS: http://127.0.0.1:3000
          ADGUARD_USERNAMES: dummy
          ADGUARD_PASSWORDS: dummy

service:
  main:
    controller: main
    primary: true
    ports:
      http:
        port: 3000
        protocol: TCP
      dns-tcp:
        port: 53
        protocol: TCP
      dns-udp:
        port: 53
        protocol: UDP
      dns-over-tls:
        enabled: true
        protocol: TCP
        port: 853
      dns-over-quic:
        enabled: true
        protocol: UDP
        port: 853
  exporter:
    enabled: true
    controller: main
    ports:
      http:
        enabled: true
        port: 9618
        protocol: TCP


serviceMonitor:
  main:
    enabled: true
    serviceName: {{printf "%s-exporter" .Release.Name | quote}}
    endpoints:
      - port: http
        scheme: http
        path: /metrics
        interval: 30s
        scrapeTimeout: 10s


persistence:
  config:
    advancedMounts:
      main:
        main:
        - path: /adguard/etc

  data:
    advancedMounts:
      main:
        main:
        - path: /adguard/var
{{ end }}

{{- $ctx := deepCopy . -}}
{{- $_ := include "hardcoded" . | fromYaml | mergeOverwrite $ctx.Values -}}

{{ include "bjw-s.common.loader.all" $ctx }}
